version: '3.8'

services:

  postgres-db:
    image: postgres:16-alpine
    container_name: log_postgres
    restart: always
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - logging-network

volumes:
  postgres_data:
    # server_logdata:
    #   external: true

networks:
  logging-network:
    driver: bridge
