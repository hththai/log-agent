# docker-compose.yml snippet
version: '3.8'

services:
  log-agent:
    build: .
    container_name: log_agent
    environment:
      - LOG_PATTERN=${LOG_PATTERN}
      - DB_DEVELOPMENT_MODE=${DB_DEVELOPMENT_MODE}
      # Pass raw variables directly instead of assembling a complex string here
      - DB_USER=${POSTGRES_USER}
      - DB_PASSWORD=${POSTGRES_PASSWORD}
      - DB_NAME=${POSTGRES_DB}
      - DB_HOST=${POSTGRES_HOST}
      - DB_PORT=5432
    volumes:
      - type: bind
        source: ${OCR_PROJECT_LOG_DIR}
        target: /incoming-logs/api
        read_only: true
        bind:
          create_host_path: false
      - type: bind
        source: ${OCR_PROJECT_LOG_CLIENT}
        target: /incoming-logs/client
        read_only: true
        bind:
          create_host_path: false
      - type: bind
        source: ${OCR_DOC_INVOICE}
        target: /incoming-logs/applog
        read_only: true
        bind:
          create_host_path: false
      - type: bind
        source: ./services.json
        target: /root/services.json
        read_only: true
      - agent_state:/state
    restart: always
    networks:
      - logging-network
  # volumes:
  # postgres_data:
  # server_logdata:
  #   external: true
  # Declared to guarantee persistent Mac storage for DB blocks

volumes:
  agent_state:

networks:
  logging-network:
    external: true
    driver: bridge
